{% extends "base.html" %}

{% block content %}
<div class="profile-container">
    <h2>Saved Posts</h2>
    <div class="posts-grid">
        {% for post in posts %}
        <div class="grid-card">
            <img src="{{ url_for('static', filename='uploads/' + post['image_filename']) }}" alt="Post">
            <div class="grid-actions">
                <span>@{{ post['username'] }}</span>
            </div>
        </div>
        {% else %}
        <p>No saved posts yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="profile-container">
    <h2 style="color: white; margin-bottom: 20px;">My Posts</h2>
    <div class="posts-grid">
        {% for post in posts %}
        <div class="grid-card">
            <img src="{{ url_for('static', filename='uploads/' + post['image_filename']) }}" alt="Post">
            <div class="grid-actions">
                <span>{{ post['like_count'] }} likes</span>
                <span>{{ post['comment_count'] }} comments</span>
                <form action="{{ url_for('delete_post', post_id=post['id']) }}" method="POST" style="display: inline;">
                    <button type="submit" onclick="return confirm('Delete this post?')">Delete</button>
                </form>
            </div>
        </div>
        {% else %}
        <div class="card" style="padding: 40px; text-align: center;">
            <p style="color: #6b6b6b;">You haven't posted anything yet.</p>
            <a href="{{ url_for('index') }}" style="color: #1da1f2; text-decoration: none;">Upload your first post →</a>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Login - Social Gallery{% endblock %}

{% block content %}
<button class="back-btn-mobile" id="backBtnMobile" aria-label="Go back">
    <i class="fas fa-arrow-left"></i>
</button>
<div class="auth-container">
    <div class="card auth-card">
        <h2><i class="fas fa-sign-in-alt"></i> Welcome Back</h2>
        
        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">
                <i class="fas fa-arrow-right"></i> Sign In
            </button>
        </form>
        
        <p style="margin-top: 20px; text-align: center;">
            Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--brand);">Register</a>
        </p>
    </div>
</div>
{% endblock %}
